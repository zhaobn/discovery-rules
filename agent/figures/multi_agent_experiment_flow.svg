<svg width="680" height="570" viewBox="0 0 680 570" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <title>Multi-Agent Experiment Flow</title>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="570" fill="white"/>

  <!-- OUTER: run_experiment() -->
  <rect x="20" y="16" width="640" height="538" rx="12" fill="none" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="36" y="34" font-size="12" fill="#888888">run_experiment(conditions, runs, seeds)  →  results.csv</text>
  <text x="36" y="60" font-size="12" fill="#aaaaaa">for condition, run, seed in combinations:</text>

  <!-- INNER: episode loop -->
  <rect x="44" y="68" width="608" height="390" rx="10" fill="none" stroke="#cccccc" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="60" y="86" font-size="12" fill="#aaaaaa">ExecutorAgent — episode loop  (until budget exhausted)</text>

  <!-- ENV INIT -->
  <rect x="68" y="96" width="220" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="178" y="118" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">ComposeEnv(seed)</text>
  <text x="178" y="138" font-size="12" fill="#0F6E56" text-anchor="middle">state, actions = env.reset()</text>

  <!-- EXECUTOR INIT -->
  <rect x="392" y="96" width="220" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="502" y="118" font-size="14" font-weight="500" fill="#4A1B0C" text-anchor="middle">ExecutorAgent()</text>
  <text x="502" y="138" font-size="12" fill="#993C1D" text-anchor="middle">history = []</text>

  <!-- merge connectors -->
  <line x1="178" y1="148" x2="178" y2="186" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="502" y1="148" x2="502" y2="186" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="178" y1="186" x2="502" y2="186" stroke="#bbbbbb" stroke-width="1" fill="none"/>
  <line x1="340" y1="186" x2="340" y2="206" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- HYPOTHESIS AGENT -->
  <rect x="100" y="206" width="480" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="228" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle">HypothesisAgent.propose(history, game_instructions)</text>
  <text x="340" y="248" font-size="12" fill="#534AB7" text-anchor="middle">→ hypothesis</text>

  <line x1="340" y1="258" x2="340" y2="286" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- PLANNER AGENT -->
  <rect x="100" y="286" width="480" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="308" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">PlannerAgent.choose_action(hypothesis, state, actions)</text>
  <text x="340" y="328" font-size="12" fill="#185FA5" text-anchor="middle">→ action</text>

  <line x1="340" y1="338" x2="340" y2="366" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ENV STEP -->
  <rect x="100" y="366" width="480" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="388" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">env.step(action)</text>
  <text x="340" y="408" font-size="12" fill="#0F6E56" text-anchor="middle">→ state′, reward, info</text>

  <!-- feedback loop -->
  <path d="M580 392 L622 392 L622 232 L580 232" fill="none" stroke="#bbbbbb" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="628" y="316" font-size="12" fill="#aaaaaa">history</text>
  <text x="628" y="330" font-size="12" fill="#aaaaaa">+= step</text>

  <!-- SAVE ROW -->
  <line x1="340" y1="418" x2="340" y2="458" stroke="#888888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="44" y="458" width="608" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="476" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">append row → results.csv</text>
  <text x="340" y="496" font-size="12" fill="#5F5E5A" text-anchor="middle">condition, run, seed, step, action, reward, score, info</text>

  <!-- Legend -->
  <rect x="44" y="526" width="10" height="10" rx="2" fill="#1D9E75"/>
  <text x="60" y="536" font-size="12" fill="#444441">ComposeEnv</text>
  <rect x="154" y="526" width="10" height="10" rx="2" fill="#D85A30"/>
  <text x="170" y="536" font-size="12" fill="#444441">ExecutorAgent</text>
  <rect x="268" y="526" width="10" height="10" rx="2" fill="#7F77DD"/>
  <text x="284" y="536" font-size="12" fill="#444441">HypothesisAgent</text>
  <rect x="398" y="526" width="10" height="10" rx="2" fill="#378ADD"/>
  <text x="414" y="536" font-size="12" fill="#444441">PlannerAgent</text>
</svg>
